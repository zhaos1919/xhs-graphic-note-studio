<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初见名场面封面编辑器</title>
  <style>
    :root {
      --panel-w: 360px;
      --bg: #f6f3ee;
      --line: #e7dfd6;
      --text: #222;
      --muted: #666;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      display: grid;
      grid-template-columns: var(--panel-w) 1fr;
      min-height: 100vh;
    }
    .panel {
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 20px;
      overflow: auto;
    }
    .preview {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .group {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #f0ebe5;
    }
    .group:last-child { border-bottom: 0; }
    h1 {
      font-size: 20px;
      margin: 0 0 6px;
    }
    .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      margin: 10px 0 6px;
      color: #444;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1px solid #d9d0c6;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 72px; resize: vertical; }
    input[type="range"] { width: 100%; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: 0;
      background: #222;
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #efe8de;
      color: #222;
    }
    .canvas-shell {
      background: #fff;
      padding: 14px;
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.08);
      max-width: min(100%, 860px);
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: #f5eee6;
    }
    .small-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: #f5efe7;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    @media (max-width: 960px) {
      .wrap { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <div class="group">
        <h1>初见名场面封面编辑器</h1>
        <div class="desc">默认底图已经换成你刚发的这张粉色弥散图；主标题也已经整体下移，更接近画面中部。可以直接改三段文字，也可以继续换底图，然后导出 PNG。</div>
        <div class="small-note">使用方法：修改文字 → 可选上传底图 → 点击“下载成品 PNG”。</div>
      </div>

      <div class="group">
        <label>上传底图</label>
        <input type="file" id="bgUpload" accept="image/*" />
        <div class="chip-row">
          <div class="chip" id="resetBg">恢复默认底图</div>
          <div class="chip" id="usePinkPreset">恢复当前版式</div>
        </div>
      </div>

      <div class="group">
        <label>上方文字</label>
        <input type="text" id="topText" value="可以写进小说的" />

        <label>中间主标题</label>
        <textarea id="mainText">“初见名场面”</textarea>

        <label>下方文字</label>
        <input type="text" id="bottomText" value="小说素材、干货分享" />
      </div>

      <div class="group">
        <label>字体风格</label>
        <select id="fontFamily">
          <option value='"Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif'>中文衬线（推荐）</option>
          <option value='"STSong", "Songti SC", serif'>宋体风</option>
          <option value='"KaiTi", "Kaiti SC", serif'>楷体风</option>
          <option value='"Microsoft YaHei", "PingFang SC", sans-serif'>黑体风</option>
        </select>

        <div class="row">
          <div>
            <label>上方字号</label>
            <input type="number" id="topSize" value="52" min="20" max="120" />
          </div>
          <div>
            <label>主标题字号</label>
            <input type="number" id="mainSize" value="150" min="40" max="260" />
          </div>
        </div>
        <div>
          <label>下方字号</label>
          <input type="number" id="bottomSize" value="54" min="20" max="120" />
        </div>
      </div>

      <div class="group">
        <label>位置微调</label>
        <label>上方文字 Y 位置</label>
        <input type="range" id="topY" min="0" max="100" value="23" />
        <label>主标题 Y 位置</label>
        <input type="range" id="mainY" min="0" max="100" value="45" />
        <label>下方文字 Y 位置</label>
        <input type="range" id="bottomY" min="0" max="100" value="82" />
      </div>

      <div class="group">
        <label>主标题字重</label>
        <select id="mainWeight">
          <option value="700" selected>加粗</option>
          <option value="400">常规</option>
        </select>
        <label>文字颜色</label>
        <input type="text" id="textColor" value="#000000" />
      </div>

      <div class="btns">
        <button id="downloadBtn">下载成品 PNG</button>
        <button class="secondary" id="resetBtn">恢复默认文字</button>
      </div>
    </aside>

    <main class="preview">
      <div class="canvas-shell">
        <canvas id="poster" width="1242" height="1660"></canvas>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById('poster');
    const ctx = canvas.getContext('2d');

    const els = {
      bgUpload: document.getElementById('bgUpload'),
      topText: document.getElementById('topText'),
      mainText: document.getElementById('mainText'),
      bottomText: document.getElementById('bottomText'),
      topSize: document.getElementById('topSize'),
      mainSize: document.getElementById('mainSize'),
      bottomSize: document.getElementById('bottomSize'),
      topY: document.getElementById('topY'),
      mainY: document.getElementById('mainY'),
      bottomY: document.getElementById('bottomY'),
      mainWeight: document.getElementById('mainWeight'),
      textColor: document.getElementById('textColor'),

      resetBg: document.getElementById('resetBg'),
      usePinkPreset: document.getElementById('usePinkPreset')

    function fitCover(img, cw, ch) {
      const ir = img.width / img.height;
      const cr = cw / ch;
      let sx = 0, sy = 0, sw = img.width, sh = img.height;
      if (ir > cr) {
        sw = img.height * cr;
        sx = (img.width - sw) / 2;
      } else {
        sh = img.width / cr;
        sy = (img.height - sh) / 2;
      }
      return { sx, sy, sw, sh };
    }

    function autoFitMainText(text, maxWidth, initialSize, family, weight) {
      let size = Number(initialSize);
      ctx.textAlign = 'center';
      while (size > 36) {
        ctx.font = `${weight} ${size}px ${family}`;
        if (ctx.measureText(text).width <= maxWidth) break;
        size -= 2;
      }
      return size;
    }

    function drawCenteredText(text, y, size, weight, family, color) {
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillText(text, canvas.width / 2, y);
    }

    function drawLeftText(text, x, y, size, weight, family, color) {
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillText(text, x, y);
    }

    function sanitizeFileName(name) {
      const cleaned = String(name || '')
        .replace(/[\\/:*?"<>|]/g, '')
        .trim();
      if (!cleaned) return '封面成品.png';
      return cleaned.toLowerCase().endsWith('.png') ? cleaned : `${cleaned}.png`;
    }

    function buildDownloadName(defaultName) {
      return sanitizeFileName(runtimeFileName || defaultName);
    }

    function downloadPoster(defaultName) {
      render();
      const link = document.createElement('a');
      link.download = buildDownloadName(defaultName);
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function applyQueryText() {
      if (hasAppliedQueryText) return;
      hasAppliedQueryText = true;
      let changed = false;
      if (queryConfig.topText) {
        els.topText.value = queryConfig.topText;
        changed = true;
      }
      if (queryConfig.mainText) {
        els.mainText.value = queryConfig.mainText;
        changed = true;
      }
      if (queryConfig.bottomText) {
        els.bottomText.value = queryConfig.bottomText;
        changed = true;
      }
      if (changed) {
        render();
      }
    }

    function applyPayload(payload) {
      if (!payload || typeof payload !== 'object') return;
      hasAppliedQueryText = true;
      let changed = false;

      if (typeof payload.topText === 'string') {
        els.topText.value = payload.topText;
        changed = true;
      }
      if (typeof payload.mainText === 'string') {
        els.mainText.value = payload.mainText;
        changed = true;
      }
      if (typeof payload.bottomText === 'string') {
        els.bottomText.value = payload.bottomText;
        changed = true;
      }
      if (typeof payload.fileName === 'string') {
        runtimeFileName = payload.fileName;
      }

      if (changed) {
        render();
      }
    }

    function isMessageTarget(template) {
      return !template || template === 'all' || template === TEMPLATE_ID;
    }

    function notifyParentReady() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'cover:ready', template: TEMPLATE_ID }, '*');
      }
    }

    function setupMessageBridge() {
      window.addEventListener('message', event => {
        const data = event && event.data;
        if (!data || typeof data !== 'object' || !isMessageTarget(data.template)) return;

        if (data.type === 'cover:setText') {
          applyPayload(data);
          return;
        }
        if (data.type === 'cover:download') {
          applyPayload(data);
          downloadPoster(DEFAULT_DOWNLOAD_NAME);
        }
      });
    }

    function tryAutoDownload(defaultName) {
      if (!queryConfig.autoDownload || hasAutoDownloaded || !bgImage) return;
      hasAutoDownloaded = true;
      setTimeout(() => {
        downloadPoster(defaultName);
      }, 60);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (bgImage) {
        const { sx, sy, sw, sh } = fitCover(bgImage, canvas.width, canvas.height);
        ctx.drawImage(bgImage, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
      }

      const topText = els.topText.value || '';
      const mainText = els.mainText.value || '';
      const bottomText = els.bottomText.value || '';
      const topSize = Number(els.topSize.value || defaults.topSize);
      const bottomSize = Number(els.bottomSize.value || defaults.bottomSize);
      const mainSizeInput = Number(els.mainSize.value || defaults.mainSize);
      const topY = canvas.height * (Number(els.topY.value) / 100);
      const mainY = canvas.height * (Number(els.mainY.value) / 100);
      const bottomY = canvas.height * (Number(els.bottomY.value) / 100);
      const mainWeight = els.mainWeight.value;
      const color = els.textColor.value || '#000000';
      const family = els.fontFamily.value;

      drawLeftText(topText, canvas.width * 0.10, topY, topSize, 400, family, color);

      const fitSize = autoFitMainText(mainText, canvas.width * 0.86, mainSizeInput, family, mainWeight);
      drawCenteredText(mainText, mainY, fitSize, mainWeight, family, color);

      drawCenteredText(bottomText, bottomY, bottomSize, 700, family, color);
    }

    function bindRender(el) {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    }

    Object.values(els).forEach(el => {
      if (el && !['downloadBtn', 'resetBtn', 'resetBg', 'usePinkPreset'].includes(el.id)) bindRender(el);
    });

    els.bgUpload.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          bgImage = img;
          render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    els.resetBtn.addEventListener('click', () => {
      els.topText.value = defaults.topText;
      els.mainText.value = defaults.mainText;
      els.bottomText.value = defaults.bottomText;
      els.topSize.value = defaults.topSize;
      els.mainSize.value = defaults.mainSize;
      els.bottomSize.value = defaults.bottomSize;
      els.topY.value = defaults.topY;
      els.mainY.value = defaults.mainY;
      els.bottomY.value = defaults.bottomY;
      els.mainWeight.value = defaults.mainWeight;
      els.textColor.value = defaults.textColor;
      render();
    });

    els.resetBg.addEventListener('click', () => {
      bgImage = defaultBg;
      render();
    });

    els.usePinkPreset.addEventListener('click', () => {
      els.resetBtn.click();
      bgImage = defaultBg;
      render();
    });

    setupMessageBridge();
    applyQueryText();
    render();
    tryAutoDownload(DEFAULT_DOWNLOAD_NAME);

    els.downloadBtn.addEventListener('click', () => {
      downloadPoster(DEFAULT_DOWNLOAD_NAME);
    });
  </script>
