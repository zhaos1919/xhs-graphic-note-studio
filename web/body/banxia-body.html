<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>批量文案自动出图｜原始文本直贴版</title>
  <style>
    :root{
      --bg:#f6f7f8;--panel:#fff;--line:#dde2e8;--text:#1f2937;--muted:#6b7280;--accent:#0f766e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    }
    .wrap{
      display:grid;
      grid-template-columns:480px 1fr;
      gap:18px;
      padding:18px;
      min-height:100vh;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }
    .left,.right{padding:18px}
    .right{display:flex;flex-direction:column;gap:14px}
    h1{margin:0 0 8px;font-size:24px}
    .sub{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:14px}
    .row{margin-bottom:14px}
    label{display:block;margin-bottom:8px;font-size:14px;font-weight:700}
    input[type=file],textarea,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
      font:inherit;
    }
    textarea{
      min-height:360px;
      resize:vertical;
      line-height:1.7;
      font-size:13px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{
      border:0;border-radius:12px;padding:10px 14px;
      background:#111827;color:#fff;cursor:pointer;font:inherit
    }
    button.alt{background:var(--accent)}
    button.light{background:#e5e7eb;color:#111827}
    button:disabled{opacity:.5;cursor:not-allowed}
    .status{
      margin-top:12px;padding:10px 12px;border-radius:12px;
      background:#f3f4f6;font-size:13px;line-height:1.7;white-space:pre-wrap
    }
    .hint{font-size:12px;color:var(--muted);line-height:1.7}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .previewBox{
      flex:1;min-height:320px;display:flex;justify-content:center;align-items:flex-start;
      overflow:auto;background:#eef2f7;border:1px solid var(--line);border-radius:14px;padding:14px
    }
    canvas{max-width:100%;height:auto;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.08);background:#fff}
    .thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
    .thumb{border:1px solid var(--line);border-radius:12px;padding:8px;background:#fff;cursor:pointer}
    .thumb.active{outline:2px solid var(--accent)}
    .thumb img{width:100%;display:block;border-radius:8px}
    .thumb .t{font-size:12px;margin-top:6px;color:#374151}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media (max-width:980px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel left">
      <h1>批量文案自动出图</h1>
      <div class="sub">这版不用自己填 JSON。你可以直接把整段原始内容粘进来，例如“第 2 页 / 页标题：... / 多条正文”。系统会自动识别分页、标题和正文，并按版式自动排版。</div>

      <div class="row">
        <label>1. 背景图</label>
        <input id="bgFile" type="file" accept="image/*" />
      </div>

      <div class="mini-grid">
        <div class="row">
          <label>2. 正文字体文件（可选，建议上传思源宋体）</label>
          <input id="fontRegularFile" type="file" accept=".ttf,.otf,.ttc,.woff,.woff2" />
        </div>
        <div class="row">
          <label>3. 标题字体文件（可选，可与正文字体相同）</label>
          <input id="fontBoldFile" type="file" accept=".ttf,.otf,.ttc,.woff,.woff2" />
        </div>
      </div>

      <div class="row">
        <label>4. 直接粘贴原始文本</label>
        <textarea id="rawInput"></textarea>
      </div>

      <div class="btns">
        <button class="light" id="loadExampleBtn">载入示例</button>
        <button id="renderBtn">自动解析并渲染</button>
        <button class="alt" id="downloadCurrentBtn" disabled>下载当前页</button>
        <button class="alt" id="downloadAllBtn" disabled>下载全部页</button>
      </div>

      <div class="status" id="status">等待操作。</div>
      <div class="hint" style="margin-top:10px;">
        说明：<br>
        1）如果浏览器里字体看起来不对，通常是因为电脑没有安装对应字体。<br>
        2）最稳妥的方法是上传你本机的思源宋体字体文件。<br>
        3）文本格式支持：第 2 页、页标题：xxx，后面每行一条正文。
      </div>
    </section>

    <section class="panel right">
      <div class="toolbar">
        <div><strong>预览</strong></div>
        <div><select id="pageSelect"></select></div>
      </div>
      <div class="previewBox">
        <canvas id="previewCanvas" width="1242" height="1656"></canvas>
      </div>
      <div class="thumbs" id="thumbs"></div>
    </section>
  </div>

  <script>
    const CONFIG = {
      canvasWidth: 1242,
      canvasHeight: 1656,
      marginX: 90,
      topStart: 85,
      bottomMargin: 95,
      titleSize: 50,
      titleLineHeight: 68,
      titleGapAfter: 18,
      bodySize: 43,
      bodyLineHeight: 59,
      itemGap: 38,
      compareInnerGap: 12,
      compareGroupGap: 59,
      textColor: '#2b2620',
      maxItemsPerPage: 8
    };

    const exampleText = `第 2 页
页标题：重逢情绪描写（自动识别示例）
普通写法：她看见他，心里很难受。优化写法：她隔着人群看见他时，指尖悄悄蜷紧，连呼吸都短了一拍。
普通：她不想说话。优化：她张了张口，最后只是垂下眼，把那句“好久不见”咽回喉咙里。
【动作】她攥着书页的手指一点点发白，眼神却始终没有躲开
她从喧闹的人群里一眼认出他，像多年以前那样，毫无征兆地心跳失序
她想过无数次重逢的场面，真正见到他时，反而一句话都想不起来`;

    const bgFile = document.getElementById('bgFile');
    const fontRegularFile = document.getElementById('fontRegularFile');
    const fontBoldFile = document.getElementById('fontBoldFile');
    const rawInput = document.getElementById('rawInput');
    const statusEl = document.getElementById('status');
    const renderBtn = document.getElementById('renderBtn');
    const loadExampleBtn = document.getElementById('loadExampleBtn');
    const downloadCurrentBtn = document.getElementById('downloadCurrentBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const previewCanvas = document.getElementById('previewCanvas');
    const thumbs = document.getElementById('thumbs');
    const pageSelect = document.getElementById('pageSelect');
    const previewCtx = previewCanvas.getContext('2d');
    const BODY_TEMPLATE_ID = 'banxia';

    let backgroundImage = null;
    let renderedPages = [];
    let currentIndex = 0;
    let bodyFontFamily = '"Noto Serif CJK SC","Source Han Serif SC","STSong","SimSun","Songti SC","PingFang SC","Microsoft YaHei",serif';
    let titleFontFamily = bodyFontFamily;

    function setStatus(text){ statusEl.textContent = text; }

    function setFontByStyle(ctx, styleKey){
      if(styleKey === 'title'){
        ctx.font = `700 ${CONFIG.titleSize}px ${titleFontFamily}`;
      }else if(styleKey === 'label'){
        ctx.font = `700 ${CONFIG.bodySize}px ${titleFontFamily}`;
      }else{
        ctx.font = `400 ${CONFIG.bodySize}px ${bodyFontFamily}`;
      }
    }

    function measureText(ctx, text, styleKey){
      setFontByStyle(ctx, styleKey);
      return ctx.measureText(text).width;
    }

    async function loadLocalFont(file, familyName) {
      const url = URL.createObjectURL(file);
      const font = new FontFace(familyName, `url(${url})`);
      await font.load();
      document.fonts.add(font);
      return familyName;
    }

    function loadExample(){
      rawInput.value = exampleText;
      setStatus('已载入示例文本。');
    }

    function parseRawText(text){
      const lines = String(text).replace(/\r/g,'').split('\n');
      const pages = [];
      let current = null;

      for(const raw of lines){
        const line = raw.trim();
        if(!line) continue;

        const pageMatch = line.match(/^第\s*(\d+)\s*页(?:[-_]\d+)?$/);
        if(pageMatch){
          if(current) pages.push(current);
          current = { page_no: Number(pageMatch[1]), title: '', items: [] };
          continue;
        }

        const titleMatch = line.match(/^页标题[：:]\s*(.+)$/);
        if(titleMatch){
          if(!current) current = { page_no: '', title: '', items: [] };
          current.title = titleMatch[1].trim();
          continue;
        }

        if(!current){
          current = { page_no: '', title: '', items: [] };
        }
        current.items.push(line);
      }

      if(current) pages.push(current);
      if(!pages.length){
        throw new Error('没有识别到有效内容。请按“第 2 页 / 页标题：xxx / 每行一条正文”的格式粘贴。');
      }
      for(const p of pages){
        if(!p.title) throw new Error('有页面缺少“页标题：”这一行。');
      }
      return pages;
    }

    function wrapTextByPixel(ctx, text, maxWidth, styleKey){
      const lines = [];
      let current = '';
      for(const ch of String(text || '')){
        const test = current + ch;
        const width = measureText(ctx, test, styleKey);
        if(width <= maxWidth || !current){
          current = test;
        }else{
          lines.push(current);
          current = ch;
        }
      }
      if(current) lines.push(current);
      return lines;
    }

    function wrapMixedRuns(ctx, runs, maxWidth){
      const lines = [];
      let currentLine = [];
      let currentWidth = 0;

      function pushLine(){
        if(currentLine.length){
          lines.push(currentLine);
          currentLine = [];
          currentWidth = 0;
        }
      }

      for(const run of runs){
        const style = run.style || 'body';
        const text = String(run.text || '');
        if(!text) continue;

        for(const ch of text){
          const chWidth = measureText(ctx, ch, style);
          if(currentWidth + chWidth > maxWidth && currentLine.length){
            pushLine();
          }

          const last = currentLine[currentLine.length - 1];
          if(last && last.style === style){
            last.text += ch;
          }else{
            currentLine.push({ text: ch, style });
          }
          currentWidth += chWidth;
        }
      }
      pushLine();
      return lines;
    }

    function drawMixedLine(ctx, line, x, y){
      let currentX = x;
      for(const seg of line){
        setFontByStyle(ctx, seg.style);
        ctx.fillText(seg.text, currentX, y);
        currentX += ctx.measureText(seg.text).width;
      }
    }

    function normalizeCompareLabel(label){
      return String(label || '').replace(/[：:]$/, '') + '：';
    }

    function parseInlineCompare(line){
      const normalMatch = line.match(/普通(?:写法)?[：:]/);
      const optimizeMatch = line.match(/优化(?:写法)?[：:]/);
      if(!normalMatch || !optimizeMatch) return null;

      const normalIdx = line.indexOf(normalMatch[0]);
      const optimizeIdx = line.indexOf(optimizeMatch[0], normalIdx + normalMatch[0].length);
      if(normalIdx < 0 || optimizeIdx <= normalIdx) return null;

      const normalText = line.slice(normalIdx + normalMatch[0].length, optimizeIdx).trim();
      const optimizeText = line.slice(optimizeIdx + optimizeMatch[0].length).trim();
      if(!normalText || !optimizeText) return null;

      return {
        type: 'compare',
        normal: { label: normalizeCompareLabel(normalMatch[0]), text: normalText },
        optimize: { label: normalizeCompareLabel(optimizeMatch[0]), text: optimizeText }
      };
    }

    function parseSingleCompare(line, kind){
      const reg = kind === 'normal'
        ? /^(普通(?:写法)?)[：:]\s*(.+)$/
        : /^(优化(?:写法)?)[：:]\s*(.+)$/;
      const match = line.match(reg);
      if(!match) return null;
      return {
        label: normalizeCompareLabel(match[1]),
        text: match[2].trim()
      };
    }

    function parseTagged(line){
      const match = line.match(/^【([^】]+)】\s*(.*)$/);
      if(!match) return null;
      const tag = match[1].trim();
      const text = match[2].trim();
      if(!tag) return null;
      return { type: 'tagged', tag, text };
    }

    function parseContentBlocks(items){
      const lines = items.map(item => String(item || '').trim()).filter(Boolean);
      const blocks = [];

      for(let i = 0; i < lines.length; i++){
        const line = lines[i];

        const inlineCompare = parseInlineCompare(line);
        if(inlineCompare){
          blocks.push(inlineCompare);
          continue;
        }

        const normalOnly = parseSingleCompare(line, 'normal');
        if(normalOnly){
          const optimizeOnly = lines[i + 1] ? parseSingleCompare(lines[i + 1], 'optimize') : null;
          if(optimizeOnly){
            blocks.push({
              type: 'compare',
              normal: normalOnly,
              optimize: optimizeOnly
            });
            i += 1;
            continue;
          }
        }

        const tagged = parseTagged(line);
        if(tagged){
          blocks.push(tagged);
          continue;
        }

        blocks.push({ type: 'plain', text: line });
      }

      return blocks;
    }

    function layoutBlock(ctx, block, serialNo, maxWidth){
      if(block.type === 'compare'){
        const normalRuns = [
          { text: block.normal.label, style: 'label' },
          { text: block.normal.text ? ` ${block.normal.text}` : '', style: 'body' }
        ];
        const optimizeRuns = [
          { text: block.optimize.label, style: 'label' },
          { text: block.optimize.text ? ` ${block.optimize.text}` : '', style: 'body' }
        ];
        const normalLines = wrapMixedRuns(ctx, normalRuns, maxWidth);
        const optimizeLines = wrapMixedRuns(ctx, optimizeRuns, maxWidth);
        const height =
          normalLines.length * CONFIG.bodyLineHeight +
          CONFIG.compareInnerGap +
          optimizeLines.length * CONFIG.bodyLineHeight;
        return { type: 'compare', normalLines, optimizeLines, height };
      }

      if(block.type === 'tagged'){
        const runs = [
          { text: '【', style: 'body' },
          { text: block.tag, style: 'label' },
          { text: '】', style: 'body' },
          { text: block.text ? ` ${block.text}` : '', style: 'body' }
        ];
        const lines = wrapMixedRuns(ctx, runs, maxWidth);
        return {
          type: 'tagged',
          lines,
          height: lines.length * CONFIG.bodyLineHeight
        };
      }

      const prefix = serialNo ? `${serialNo}. ` : '';
      const runs = [
        { text: prefix, style: 'body' },
        { text: block.text || '', style: 'body' }
      ];
      const lines = wrapMixedRuns(ctx, runs, maxWidth);
      return {
        type: 'plain',
        lines,
        height: lines.length * CONFIG.bodyLineHeight
      };
    }

    function blockGap(prevEntry){
      if(!prevEntry) return 0;
      if(prevEntry.type === 'compare') return CONFIG.compareGroupGap;
      return CONFIG.itemGap;
    }

    function splitPageItems(title, blocks){
      const c = document.createElement('canvas');
      c.width = CONFIG.canvasWidth;
      c.height = CONFIG.canvasHeight;
      const ctx = c.getContext('2d');

      const maxWidth = CONFIG.canvasWidth - CONFIG.marginX * 2;
      const titleLines = wrapTextByPixel(ctx, title, maxWidth, 'title');
      const bodyStartY = CONFIG.topStart + titleLines.length * CONFIG.titleLineHeight + CONFIG.titleGapAfter;
      const usableBottom = CONFIG.canvasHeight - CONFIG.bottomMargin;

      const groups = [];
      let currentEntries = [];
      let currentY = bodyStartY;
      let currentCount = 0;
      let plainSerial = 1;
      let index = 0;

      while(index < blocks.length){
        const block = blocks[index];
        const entry = layoutBlock(ctx, block, block.type === 'plain' ? plainSerial : null, maxWidth);
        const extraGap = currentEntries.length ? blockGap(currentEntries[currentEntries.length - 1]) : 0;

        const exceedCount = currentEntries.length > 0 && currentCount >= CONFIG.maxItemsPerPage;
        const exceedHeight = currentEntries.length > 0 && (currentY + extraGap + entry.height > usableBottom);

        if(exceedCount || exceedHeight){
          groups.push({ title, titleLines, entries: currentEntries.slice() });
          currentEntries = [];
          currentY = bodyStartY;
          currentCount = 0;
          plainSerial = 1;
          continue;
        }

        if(currentEntries.length) currentY += extraGap;
        currentEntries.push(entry);
        currentY += entry.height;
        currentCount += 1;
        if(block.type === 'plain') plainSerial += 1;
        index += 1;
      }

      if(currentEntries.length){
        groups.push({ title, titleLines, entries: currentEntries.slice() });
      }
      if(!groups.length){
        groups.push({ title, titleLines, entries: [] });
      }
      return groups;
    }

    function drawDefaultBackground(ctx){
      const g = ctx.createLinearGradient(0,0,0,CONFIG.canvasHeight);
      g.addColorStop(0,'#b5d9ce');
      g.addColorStop(0.22,'#eceded');
      g.addColorStop(0.72,'#cde4df');
      g.addColorStop(1,'#64beb0');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,CONFIG.canvasWidth,CONFIG.canvasHeight);
    }

    function renderOnePage(bgImg, titleLines, entries){
      const c = document.createElement('canvas');
      c.width = CONFIG.canvasWidth;
      c.height = CONFIG.canvasHeight;
      const ctx = c.getContext('2d');

      if(bgImg){
        ctx.drawImage(bgImg, 0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);
      }else{
        drawDefaultBackground(ctx);
      }

      let y = CONFIG.topStart;
      const x = CONFIG.marginX;
      ctx.fillStyle = CONFIG.textColor;
      ctx.textBaseline = 'top';

      for(const line of titleLines){
        setFontByStyle(ctx, 'title');
        ctx.fillText(line, x, y);
        y += CONFIG.titleLineHeight;
      }
      y += CONFIG.titleGapAfter;

      entries.forEach((entry, idx) => {
        if(idx > 0) y += blockGap(entries[idx - 1]);

        if(entry.type === 'compare'){
          for(const line of entry.normalLines){
            drawMixedLine(ctx, line, x, y);
            y += CONFIG.bodyLineHeight;
          }
          y += CONFIG.compareInnerGap;
          for(const line of entry.optimizeLines){
            drawMixedLine(ctx, line, x, y);
            y += CONFIG.bodyLineHeight;
          }
          return;
        }

        for(const line of entry.lines){
          drawMixedLine(ctx, line, x, y);
          y += CONFIG.bodyLineHeight;
        }
      });

      return c;
    }

    function refreshThumbs(){
      thumbs.innerHTML = '';
      pageSelect.innerHTML = '';
      renderedPages.forEach((page, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = page.name;
        pageSelect.appendChild(opt);

        const div = document.createElement('div');
        div.className = 'thumb' + (idx === currentIndex ? ' active' : '');
        const img = document.createElement('img');
        img.src = page.canvas.toDataURL('image/png');
        const t = document.createElement('div');
        t.className = 't';
        t.textContent = page.name;
        div.appendChild(img);
        div.appendChild(t);
        div.addEventListener('click', () => showPage(idx));
        thumbs.appendChild(div);
      });
    }

    function showPage(index){
      if(!renderedPages.length) return;
      currentIndex = index;
      previewCtx.clearRect(0,0,previewCanvas.width,previewCanvas.height);
      previewCtx.drawImage(renderedPages[index].canvas,0,0);
      pageSelect.value = String(index);
      [...thumbs.children].forEach((el,i)=>el.classList.toggle('active', i===index));
    }

    function downloadCanvas(canvas, filename){
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    async function downloadAllRenderedPages(){
      if(!renderedPages.length) return;
      for(let i = 0; i < renderedPages.length; i++){
        const page = renderedPages[i];
        downloadCanvas(page.canvas, page.name);
        await new Promise(r => setTimeout(r, 250));
      }
    }

    function applyIncomingRawText(raw){
      const text = String(raw || '').replace(/\r/g, '').trim();
      if(!text) return;
      rawInput.value = text;
      setStatus('已接收外部正文内容。');
    }

    function notifyParentReady(){
      if(window.parent && window.parent !== window){
        window.parent.postMessage({ type: 'body:ready', template: BODY_TEMPLATE_ID }, '*');
      }
    }

    function setupMessageBridge(){
      window.addEventListener('message', async (event) => {
        const data = event && event.data;
        if(!data || typeof data !== 'object') return;
        if(data.template && data.template !== 'all' && data.template !== BODY_TEMPLATE_ID) return;

        try{
          if(data.type === 'body:setRaw'){
            if(typeof data.rawText === 'string') applyIncomingRawText(data.rawText);
            return;
          }

          if(data.type === 'body:render'){
            if(typeof data.rawText === 'string') applyIncomingRawText(data.rawText);
            await renderAll();
            return;
          }

          if(data.type === 'body:downloadAll'){
            if(typeof data.rawText === 'string') applyIncomingRawText(data.rawText);
            await renderAll();
            await downloadAllRenderedPages();
          }
        }catch(err){
          setStatus('消息处理失败：' + err.message);
        }
      });
    }

    async function prepareFonts(){
      let info = [];
      if(fontRegularFile.files[0]){
        bodyFontFamily = `"UserBodyFont","Noto Serif CJK SC","Source Han Serif SC","STSong","SimSun","Songti SC",serif`;
        await loadLocalFont(fontRegularFile.files[0], 'UserBodyFont');
        info.push('正文字体已加载');
      }else{
        bodyFontFamily = '"Noto Serif CJK SC","Source Han Serif SC","STSong","SimSun","Songti SC","PingFang SC","Microsoft YaHei",serif';
      }

      if(fontBoldFile.files[0]){
        titleFontFamily = `"UserTitleFont","UserBodyFont","Noto Serif CJK SC","Source Han Serif SC","STSong","SimSun","Songti SC",serif`;
        await loadLocalFont(fontBoldFile.files[0], 'UserTitleFont');
        info.push('标题字体已加载');
      }else{
        titleFontFamily = bodyFontFamily;
      }
      return info;
    }

    function buildPageName(pageNo, title, index){
      if(pageNo !== ''){
        if(index === 0) return `第${pageNo}页.png`;
        return `第${pageNo}页-${index + 1}.png`;
      }
      const safeTitle = String(title || '正文').slice(0, 12) || '正文';
      if(index === 0) return `${safeTitle}.png`;
      return `${safeTitle}-${index + 1}.png`;
    }

    async function renderAll(){
      try{
        const raw = rawInput.value.trim();
        if(!raw) throw new Error('请先粘贴原始文本内容。');

        const pages = parseRawText(raw);
        const fontInfo = await prepareFonts();

        const all = [];
        for(const page of pages){
          const pageNo = page.page_no ?? '';
          const title = page.title;
          const blocks = parseContentBlocks(page.items || []);
          const subPages = splitPageItems(title, blocks);

          subPages.forEach((sp, idx) => {
            const name = buildPageName(pageNo, title, idx);
            all.push({
              name,
              canvas: renderOnePage(backgroundImage, sp.titleLines, sp.entries)
            });
          });
        }

        renderedPages = all;
        currentIndex = 0;
        refreshThumbs();
        showPage(0);
        downloadCurrentBtn.disabled = false;
        downloadAllBtn.disabled = false;

        const fontMsg = fontInfo.length ? '；' + fontInfo.join('，') : '；未上传字体文件，当前使用本机可用字体回退';
        setStatus(`解析并渲染完成，共 ${renderedPages.length} 张${fontMsg}。`);
      }catch(err){
        console.error(err);
        setStatus('处理失败：' + err.message);
      }
    }

    bgFile.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          backgroundImage = img;
          setStatus('背景图已载入。');
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    loadExampleBtn.addEventListener('click', loadExample);
    renderBtn.addEventListener('click', renderAll);
    pageSelect.addEventListener('change', (e) => showPage(Number(e.target.value)));
    downloadCurrentBtn.addEventListener('click', () => {
      if(!renderedPages.length) return;
      const page = renderedPages[currentIndex];
      downloadCanvas(page.canvas, page.name);
    });
    downloadAllBtn.addEventListener('click', async () => {
      await downloadAllRenderedPages();
    });

    loadExample();
    previewCtx.fillStyle = '#ffffff';
    previewCtx.fillRect(0,0,previewCanvas.width,previewCanvas.height);
    previewCtx.fillStyle = '#9ca3af';
    previewCtx.font = '16px Microsoft YaHei';
    previewCtx.fillText('这里会显示渲染预览', 40, 40);
    setupMessageBridge();
    notifyParentReady();
  </script>
</body>
</html>
