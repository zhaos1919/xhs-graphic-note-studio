<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>傻瓜一键出图</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #667085;
      --line: #d7dde8;
      --primary: #0f62fe;
      --primary-dark: #0b4fd1;
      --ok: #12b76a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #eef4ff 0, #f5f7fb 46%, #f2f4f8 100%);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: min(640px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(16, 24, 40, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .form {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid #c7d0dd;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 17px;
      color: #202733;
      outline: none;
      background: #fff;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 98, 254, 0.14);
    }
    button {
      margin-top: 4px;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }
    button:hover { background: var(--primary-dark); }
    button[disabled] {
      background: #9bb6ef;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      min-height: 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .status.ok { color: var(--ok); }
    .tip {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }
    .tip a {
      color: #1f6feb;
      text-decoration: none;
    }
    .tip a:hover { text-decoration: underline; }
    iframe {
      width: 0;
      height: 0;
      border: 0;
      position: absolute;
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>输入主标题，一键出图</h1>
    <p>只做一件事：输入主标题，选择下载目标，然后一键下载。</p>

    <div class="form">
      <input id="titleInput" type="text" placeholder="请输入主标题，例如：普通人也能写出高级感文案" />
      <select id="targetSelect">
        <option value="both">下载两张（日富 + 半夏）</option>
        <option value="richu">仅下载日富</option>
        <option value="banxia">仅下载半夏</option>
      </select>
      <button id="downloadBtn" disabled>一键下载两张封面</button>
    </div>

    <div class="status" id="statusText">模板加载中，请稍等...</div>
    <div class="tip">
      选题自动生成可打开：<a href="./auto.html" target="_blank" rel="noopener">选题自动工坊</a>；<br>
      需要高级调节可打开：<a href="./advanced.html" target="_blank" rel="noopener">一键出图操作台</a>；
      需要正文制作可打开：<a href="../body/richu-body.html" target="_blank" rel="noopener">日富正文</a> / <a href="../body/banxia-body.html" target="_blank" rel="noopener">半夏正文</a>
    </div>
  </main>

  <iframe id="richuFrame" src="../templates/richu-cover.html" title="richu"></iframe>
  <iframe id="banxiaFrame" src="../templates/banxia-cover.html" title="banxia"></iframe>

  <script>
    const templates = {
      richu: {
        frame: document.getElementById('richuFrame'),
        suffix: '日富'
      },
      banxia: {
        frame: document.getElementById('banxiaFrame'),
        suffix: '半夏'
      }
    };

    const ready = { richu: false, banxia: false };
    const titleInput = document.getElementById('titleInput');
    const targetSelect = document.getElementById('targetSelect');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusText = document.getElementById('statusText');

    function setStatus(text, isOk) {
      statusText.textContent = text;
      statusText.classList.toggle('ok', Boolean(isOk));
    }

    function cleanFileNamePart(value) {
      return String(value || '').replace(/[\\/:*?"<>|]/g, '').trim();
    }

    function buildFileName(templateKey) {
      const title = cleanFileNamePart(titleInput.value).slice(0, 40) || '封面';
      return `${title}-${templates[templateKey].suffix}.png`;
    }

    function commonPayload(templateKey) {
      return {
        template: templateKey,
        mainText: titleInput.value.trim(),
        fileName: buildFileName(templateKey)
      };
    }

    function postToTemplate(templateKey, type) {
      const target = templates[templateKey];
      if (!target || !target.frame || !target.frame.contentWindow) return;
      target.frame.contentWindow.postMessage({ type, ...commonPayload(templateKey) }, '*');
    }

    function allReady() {
      return ready.richu && ready.banxia;
    }

    function selectedTarget() {
      return targetSelect.value || 'both';
    }

    function targetLabel(target) {
      if (target === 'richu') return '日富';
      if (target === 'banxia') return '半夏';
      return '日富 + 半夏';
    }

    function updateButtonText() {
      const target = selectedTarget();
      if (target === 'richu') {
        downloadBtn.textContent = '一键下载日富封面';
      } else if (target === 'banxia') {
        downloadBtn.textContent = '一键下载半夏封面';
      } else {
        downloadBtn.textContent = '一键下载两张封面';
      }
    }

    function updateReadyState() {
      if (allReady()) {
        downloadBtn.disabled = false;
        setStatus('模板已就绪，可以一键下载。', true);
      } else {
        downloadBtn.disabled = true;
        setStatus('模板加载中，请稍等...', false);
      }
    }

    function downloadSelected() {
      const title = titleInput.value.trim();
      if (!title) {
        setStatus('请先输入主标题。', false);
        titleInput.focus();
        return;
      }
      if (!allReady()) {
        setStatus('模板还没加载完成，请稍等几秒再点。', false);
        return;
      }

      const target = selectedTarget();
      if (target === 'richu' || target === 'banxia') {
        postToTemplate(target, 'cover:setText');
        postToTemplate(target, 'cover:download');
        setStatus(`已触发下载：${targetLabel(target)}。`, true);
        return;
      }

      postToTemplate('richu', 'cover:setText');
      postToTemplate('banxia', 'cover:setText');
      postToTemplate('richu', 'cover:download');
      setTimeout(() => {
        postToTemplate('banxia', 'cover:download');
      }, 90);
      setStatus(`已触发下载：${targetLabel(target)}。`, true);
    }

    downloadBtn.addEventListener('click', downloadSelected);
    targetSelect.addEventListener('change', updateButtonText);
    titleInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        downloadSelected();
      }
    });

    window.addEventListener('message', event => {
      const data = event && event.data;
      if (!data || typeof data !== 'object') return;
      if (data.type !== 'cover:ready') return;
      if (!Object.prototype.hasOwnProperty.call(ready, data.template)) return;

      ready[data.template] = true;
      updateReadyState();
    });

    const query = new URLSearchParams(window.location.search);
    const presetTitle = query.get('title') || '';
    if (presetTitle) {
      titleInput.value = presetTitle;
    }

    updateButtonText();
    updateReadyState();
    titleInput.focus();
  </script>
</body>
</html>
